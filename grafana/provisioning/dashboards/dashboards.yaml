apiVersion: 1

providers:
  - name: MeshCore
    orgId: 1
    type: file
    disableDeletion: false
    # Allow edits in the UI without them being reverted on the next scan.
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
